<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>blurt</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: grid;
        place-items: center;
        padding: 24px;
        background: #fffbf7;
        color: #2b2622;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
      }
      .card {
        max-width: 22rem;
        text-align: center;
      }
      .bubble {
        font-size: 64px;
        line-height: 1;
      }
      h1 {
        margin: 0.6rem 0 0.3rem;
        font-size: 1.4rem;
        color: #ff7a66;
      }
      p {
        margin: 0.4rem 0;
        color: #5b544e;
        line-height: 1.5;
      }
      .muted {
        font-size: 0.85rem;
        color: #9a938c;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="bubble">💭</div>
      <h1>blurt</h1>
      <p>This shared blurt opens in the <strong>Blurt</strong> Android app.</p>
      <p class="muted">
        If nothing happened, the app isn't installed (or this device hasn't
        verified the link yet) — the note itself is in the message you received.
      </p>
    </div>
  </body>
</html>
